version: '3.8'

services:
  backend-api:
    build: ./backend
    container_name: production-backend
    ports:
      - "5000:5000"
    networks:
      - production-network

  frontend-web:
    build: ./frontend
    container_name: production-frontend
    ports:
      - "80:80"
    networks:
      - production-network
    depends_on:
      - backend-api

networks:
  production-network:
    driver: bridge
