<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tier Production Architecture</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; padding: 40px; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto; }
        h1 { color: #0066cc; }
        .status-badge { background: #2ecc71; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; display: inline-block; }
        ul { text-align: left; background: #eee; padding: 20px 40px; border-radius: 8px; list-style-type: square; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Production Multi-Tier Core</h1>
        <p>Frontend status: <span class="status-badge">Active</span></p>
        <hr>
        <h3>Data Received From Isolated Backend Tier:</h3>
        <div id="backend-response">Loading active telemetry...</div>
    </div>

    <script>
        // Use relative URL path routing; our reverse proxy / port layout handles mapping
        fetch('http://' + window.location.hostname + ':5000/api/data')
            .then(response => response.json())
            .then(data => {
                let listItems = data.payload.map(item => `<li>${item}</li>`).join('');
                document.getElementById('backend-response').innerHTML = `
                    <p>Status: <strong>${data.status}</strong></p>
                    <p>Layer: ${data.tier}</p>
                    <ul>${listItems}</ul>
                `;
            })
            .catch(err => {
                document.getElementById('backend-response').innerHTML = `<span style="color: red;">Error connecting to API Layer.</span>`;
            });
    </script>
</body>
</html>
